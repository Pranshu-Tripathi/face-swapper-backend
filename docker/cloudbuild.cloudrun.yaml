# Cloud Build config for the slim Cloud Run image.
# Invoke from repo root:
#   gcloud builds submit --config docker/cloudbuild.cloudrun.yaml \
#     --substitutions=_IMAGE="$IMAGE" .

steps:
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-f'
      - 'docker/Dockerfile.cloudrun'
      - '-t'
      - '${_IMAGE}'
      - '.'
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', '${_IMAGE}']

images:
  - '${_IMAGE}'

options:
  machineType: 'E2_HIGHCPU_8'

timeout: 1800s
