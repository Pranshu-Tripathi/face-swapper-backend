apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: face-swapper
  namespace: face-swapper
  annotations:
    # Image uploads can be a few MB; raise the default body cap.
    nginx.ingress.kubernetes.io/proxy-body-size: "25m"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "120"
spec:
  ingressClassName: nginx
  rules:
    - host: face-swapper.example.com   # replace with your hostname
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: face-swapper
                port:
                  number: 80
