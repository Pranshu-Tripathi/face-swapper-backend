apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# Local-only bundle. Ingress is intentionally excluded — it requires an
# in-cluster ingress controller. Use `kubectl port-forward` instead
# (see usage steps below).
resources:
  - namespace.yaml
  - configmap.yaml
  - pvc.yaml
  - deployment.yaml
  - service.yaml
  - cleanup-cronjob.yaml
